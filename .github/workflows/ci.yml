name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  quality:
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/')
    runs-on: [self-hosted, linux, x64, nvidia]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: sbt

      - name: Check sbt launcher
        run: sbt --script-version

      - name: Run quality gate
        env:
          __GL_THREADED_OPTIMIZATIONS: "0"
        run: sbt clean "scalafix --check" test package doc

  coverage:
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/')
    runs-on: [self-hosted, linux, x64, nvidia]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: sbt

      - name: Generate coverage report
        env:
          __GL_THREADED_OPTIMIZATIONS: "0"
        run: sbt clean coverage test coverageReport

      - name: Check coverage policy
        run: scripts/check-coverage-policy.sh

  main-release-gate:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [quality, coverage]
    runs-on: [self-hosted, linux, x64, nvidia]
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find merged PR
        id: merged-pr
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });

            const merged = prs.data.find((pr) => pr.merged_at);
            if (!merged) {
              core.setFailed(
                `No merged PR found for ${context.sha}; release exceptions are PR-title based.`
              );
              return;
            }

            const noRelease = merged.title.includes("NORELEASE");
            core.info(`Associated merged PR #${merged.number}: ${merged.title}`);
            core.setOutput("title", merged.title);
            core.setOutput("no_release", noRelease ? "true" : "false");

      - name: Skip release
        if: steps.merged-pr.outputs.no_release == 'true'
        run: echo "PR title contains NORELEASE; skipping tag creation and publication."

      - name: Check release version policy
        if: steps.merged-pr.outputs.no_release != 'true'
        run: scripts/check-version-policy.sh --release

      - name: Create release tag
        if: steps.merged-pr.outputs.no_release != 'true'
        run: |
          version="$(scripts/check-version-policy.sh --print-version)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$version" "$GITHUB_SHA"
          git push origin "refs/tags/$version"

  publish-maven-central:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: [self-hosted, linux, x64, nvidia]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! printf '%s\n' "$tag" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Tag $tag is not a semantic release tag."
            exit 1
          fi

          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag $tag does not point to a commit reachable from origin/main."
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: sbt

      - name: Import GPG key
        env:
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
        run: |
          if [ -z "${PGP_SECRET:-}" ]; then
            echo "PGP_SECRET is required for Maven Central publication."
            exit 1
          fi

          mkdir -p "$HOME/.gnupg"
          chmod 700 "$HOME/.gnupg"
          printf '%s' "$PGP_SECRET" | base64 --decode | gpg --batch --import

      - name: Publish to Maven Central
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          __GL_THREADED_OPTIMIZATIONS: "0"
        run: sbt publishSigned sonatypeBundleRelease
