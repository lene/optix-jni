name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: [self-hosted, linux, x64, nvidia]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: sbt
      - run: sbt --script-version
      - run: sbt clean "scalafix --check" test
