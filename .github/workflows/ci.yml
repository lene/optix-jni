name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['[0-9]+.[0-9]+.[0-9]+']

jobs:
  # ── preconditions ──────────────────────────────────────────────────────────

  changelog-updated:
    name: Changelog Updated
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check changelog entry exists and is dated
        run: |
          VERSION=$(grep 'version :=' build.sbt | cut -d'"' -f2)
          test -n "$VERSION"
          grep -F "## [$VERSION]" CHANGELOG.md
          grep -F "[$VERSION]:" CHANGELOG.md
          # Only enforce today's date when this PR bumps the version vs main
          MAIN_VERSION=$(git show origin/main:build.sbt 2>/dev/null | grep 'version :=' | cut -d'"' -f2)
          if [ "$VERSION" != "$MAIN_VERSION" ] && \
             ! echo "${{ github.event.pull_request.title }}" | grep -q '^Draft:'; then
            grep -F "## [$VERSION] - $(date +%Y-%m-%d)" CHANGELOG.md
          fi

  version-not-tagged:
    name: Version Not Yet Tagged
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check tag does not already exist for new versions
        run: |
          VERSION=$(grep 'version :=' build.sbt | cut -d'"' -f2)
          test -n "$VERSION"
          git fetch --tags
          MAIN_VERSION=$(git show origin/main:build.sbt 2>/dev/null | grep 'version :=' | cut -d'"' -f2)
          # Only fail if this branch bumps the version and the tag already exists
          if [ "$VERSION" != "$MAIN_VERSION" ] && git tag | grep -q "^${VERSION}$"; then
            echo "ERROR: Tag $VERSION already exists"
            exit 1
          fi

  # ── check ──────────────────────────────────────────────────────────────────

  scalafix:
    name: Scalafix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'sbt'
      - uses: sbt/setup-sbt@v1
      - run: sbt "scalafix --check"

  archunit:
    name: ArchUnit
    runs-on: [self-hosted, Linux, X64, nvidia]
    steps:
      - uses: actions/checkout@v4
      - name: Add CUDA to PATH
        run: echo "/usr/local/cuda/bin" >> $GITHUB_PATH
      - run: sbt "testOnly *ArchUnit*"

  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck
      - name: Run cppcheck
        run: |
          find src/main/native \( -name "*.cpp" -o -name "*.h" \) | \
            xargs cppcheck --error-exitcode=1 --enable=warning,style \
            --language=c++ \
            --suppressions-list=.cppcheck-suppress

  clang-tidy:
    name: clang-tidy
    runs-on: [self-hosted, Linux, X64, nvidia]
    steps:
      - uses: actions/checkout@v4
      - name: Configure CMake (fetches FetchContent deps, generates compile_commands.json)
        run: |
          cmake -B target/cmake-clang-check \
            -DCMAKE_CUDA_COMPILER=/usr/local/cuda/bin/nvcc \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -Wno-dev --log-level=WARNING \
            src/main/native
      - name: Run clang-tidy
        run: |
          mapfile -t cpp_files < <(find src/main/native -name "*.cpp")
          gcc_install_dir="$(dirname "$(g++ -print-file-name=include)")"
          clang-tidy -p target/cmake-clang-check \
            --config-file=.clang-tidy \
            --extra-arg-before=--gcc-install-dir="${gcc_install_dir}" \
            "${cpp_files[@]}"

  doc-completeness:
    name: JNI API Doc Completeness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run doc completeness check
        run: bash scripts/check-doc-completeness.sh

  # ── test ───────────────────────────────────────────────────────────────────

  scala-tests:
    name: Scala Tests (GPU)
    runs-on: [self-hosted, Linux, X64, nvidia]
    steps:
      - uses: actions/checkout@v4
      - name: Add CUDA to PATH
        run: echo "/usr/local/cuda/bin" >> $GITHUB_PATH
      - name: Run Scala tests
        run: sbt test

  # ── build ──────────────────────────────────────────────────────────────────

  build-native:
    name: Build native .so + JAR
    runs-on: [self-hosted, Linux, X64, nvidia]
    needs: [scala-tests, scalafix]
    steps:
      - uses: actions/checkout@v4
      - name: Add CUDA to PATH
        run: echo "/usr/local/cuda/bin" >> $GITHUB_PATH
      - name: Build
        run: sbt nativeCompile package
      - uses: actions/upload-artifact@v4
        with:
          name: optix-jni-artifacts
          path: |
            target/*.jar
            target/scala-3*/*.jar
            target/native/x86_64-linux/bin/*.so

  # ── test-built ─────────────────────────────────────────────────────────────

  smoke-tests:
    name: Smoke Tests (Java + Kotlin)
    runs-on: [self-hosted, Linux, X64, nvidia]
    needs: [build-native]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: optix-jni-artifacts
          path: artifacts/
      - name: Ensure Maven available
        run: |
          if ! command -v mvn &>/dev/null; then
            MVN_VERSION=3.9.9
            curl -fsSL \
              "https://archive.apache.org/dist/maven/maven-3/${MVN_VERSION}/binaries/apache-maven-${MVN_VERSION}-bin.tar.gz" \
              | tar -xz -C /tmp
            echo "/tmp/apache-maven-${MVN_VERSION}/bin" >> $GITHUB_PATH
          fi
      - name: Install built JAR to local Maven repo
        run: |
          VERSION=$(grep 'version :=' build.sbt | cut -d'"' -f2)
          echo "Artifacts found:"
          find artifacts -type f | sort
          JAR=$(find artifacts -name "*.jar" ! -name "*sources*" ! -name "*javadoc*" | head -1)
          if [ -z "$JAR" ]; then
            echo "ERROR: No JAR found in artifacts/"
            exit 1
          fi
          echo "Installing: $JAR as optix-jni:$VERSION"
          mvn install:install-file \
            -Dfile="$JAR" \
            -DgroupId=io.github.lene \
            -DartifactId=optix-jni \
            -Dversion="$VERSION" \
            -Dpackaging=jar \
            -DgeneratePom=true
      - name: Run Java smoke test
        run: |
          VERSION=$(grep 'version :=' build.sbt | cut -d'"' -f2)
          cd smoke-tests/java
          mvn test -Doptix.version=$VERSION \
            -Doptix.native.path=$(pwd)/../../artifacts/native/x86_64-linux/bin
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'
      - name: Run Kotlin smoke test
        run: |
          VERSION=$(grep 'version :=' build.sbt | cut -d'"' -f2)
          NATIVE_PATH=$(pwd)/artifacts/native/x86_64-linux/bin
          cd smoke-tests/kotlin
          LD_LIBRARY_PATH="$NATIVE_PATH:$LD_LIBRARY_PATH" gradle test \
            -Poptix.version=$VERSION -Poptix.native.path=$NATIVE_PATH

  # ── ai review ──────────────────────────────────────────────────────────────

  ai-review:
    name: AI Code Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr diff ${{ github.event.pull_request.number }} > pr.diff

      - name: Run AI review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          standards/scripts/review.sh \
            --diff pr.diff \
            --guidelines standards/review-guidelines.md \
            --arch-guidelines standards/architecture-review-guidelines.md \
            --output review-findings.json

      - name: Post review to GitHub PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
        run: standards/scripts/github-pr-review.sh review-findings.json

  # ── main release gate ──────────────────────────────────────────────────────

  main-release-gate:
    name: Main Release Gate
    runs-on: ubuntu-latest
    needs:
      - scalafix
      - archunit
      - cppcheck
      - clang-tidy
      - doc-completeness
      - smoke-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decide release intent
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_query='map(select(.merged_at != null)) | sort_by(.merged_at) | last'
          pr_api="/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls"
          pr_number="$(gh api -H "Accept: application/vnd.github+json" "$pr_api" \
            --jq "${pr_query}.number // \"\"")"
          pr_title="$(gh api -H "Accept: application/vnd.github+json" "$pr_api" \
            --jq "${pr_query}.title // \"\"")"

          if [ -z "$pr_number" ]; then
            echo "ERROR: main release gate requires a merged PR for ${GITHUB_SHA}"
            exit 1
          fi

          echo "Merged PR #${pr_number}: ${pr_title}"
          if echo "$pr_title" | grep -qi 'NORELEASE'; then
            echo "NORELEASE found in PR title; skipping tag creation"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version="$(grep 'version :=' build.sbt | cut -d'"' -f2)"
          if [ -z "$version" ]; then
            echo "ERROR: Could not read version from build.sbt"
            exit 1
          fi
          if echo "$version" | grep -qi 'SNAPSHOT'; then
            echo "ERROR: Release version must not be a snapshot: $version"
            exit 1
          fi
          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Release version must be semver X.Y.Z: $version"
            exit 1
          fi

          git fetch --tags origin
          if git rev-parse -q --verify "refs/tags/${version}" >/dev/null; then
            echo "ERROR: Tag ${version} already exists"
            exit 1
          fi

          latest_tag="$(git tag --list '[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1)"
          if [ -n "$latest_tag" ]; then
            highest="$(printf '%s\n%s\n' "$latest_tag" "$version" | sort -V | tail -n 1)"
            if [ "$highest" != "$version" ]; then
              echo "ERROR: Version ${version} must be newer than latest tag ${latest_tag}"
              exit 1
            fi
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - name: Create release tag
        if: steps.release.outputs.skip != 'true'
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TRIGGER_TOKEN }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          if [ -z "$RELEASE_TOKEN" ]; then
            echo "ERROR: RELEASE_TRIGGER_TOKEN secret is required to create a tag that triggers release CI"
            exit 1
          fi

          git tag "$VERSION" "$GITHUB_SHA"
          git push "https://x-access-token:${RELEASE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "refs/tags/${VERSION}"

  # ── publish ────────────────────────────────────────────────────────────────

  publish:
    name: Publish to Maven Central + GitHub Release
    runs-on: [self-hosted, Linux, X64, nvidia]
    needs: [smoke-tests, build-native]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate release tag
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! echo "$tag" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Release tag must be semver X.Y.Z: $tag"
            exit 1
          fi

          version="$(grep 'version :=' build.sbt | cut -d'"' -f2)"
          if [ "$tag" != "$version" ]; then
            echo "ERROR: Tag ${tag} does not match build.sbt version ${version}"
            exit 1
          fi

          git fetch origin main --tags
          tag_commit="$(git rev-list -n 1 "$tag")"
          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "ERROR: Tag ${tag} commit ${tag_commit} is not reachable from origin/main"
            exit 1
          fi
      - name: Add CUDA to PATH
        run: echo "/usr/local/cuda/bin" >> $GITHUB_PATH
      - name: Import GPG key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
      - name: Publish to Maven Central
        run: sbt nativeCompile publishSigned sonatypeBundleRelease
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          PGP_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            target/*.jar
            target/scala-3*/*.jar
            target/native/x86_64-linux/bin/*.so
          generate_release_notes: false
          body_path: CHANGELOG.md

  # ── post-publish verification ───────────────────────────────────────────────

  post-publish-smoke:
    name: Post-Publish Smoke Test (Maven Central)
    runs-on: [self-hosted, Linux, X64, nvidia]
    needs: [publish]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Wait for Maven Central sync
        run: |
          VERSION=$(grep 'version :=' build.sbt | cut -d'"' -f2)
          URL="https://repo1.maven.org/maven2/io/github/lene/optix-jni/${VERSION}/optix-jni-${VERSION}.pom"
          for i in $(seq 1 20); do
            if curl -sf "$URL" > /dev/null 2>&1; then
              echo "Artifact available on Maven Central"
              exit 0
            fi
            echo "Not yet available (attempt $i/20), waiting 30s..."
            sleep 30
          done
          echo "ERROR: Artifact not available after 10 minutes"
          exit 1
      - name: Ensure Maven available
        run: |
          if ! command -v mvn &>/dev/null; then
            MVN_VERSION=3.9.9
            curl -fsSL \
              "https://archive.apache.org/dist/maven/maven-3/${MVN_VERSION}/binaries/apache-maven-${MVN_VERSION}-bin.tar.gz" \
              | tar -xz -C /tmp
            echo "/tmp/apache-maven-${MVN_VERSION}/bin" >> $GITHUB_PATH
          fi
      - name: Download native library from GitHub Release
        run: |
          VERSION=$(grep 'version :=' build.sbt | cut -d'"' -f2)
          mkdir -p /tmp/optix-post-publish-native
          gh release download $VERSION --repo lene/optix-jni \
            --pattern "*.so" --dir /tmp/optix-post-publish-native --clobber
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Run Java smoke test against published artifact
        run: |
          VERSION=$(grep 'version :=' build.sbt | cut -d'"' -f2)
          cd smoke-tests/java
          mvn test -Doptix.version=$VERSION \
            -Doptix.native.path=/tmp/optix-post-publish-native
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'
      - name: Run Kotlin smoke test against published artifact
        run: |
          VERSION=$(grep 'version :=' build.sbt | cut -d'"' -f2)
          cd smoke-tests/kotlin
          LD_LIBRARY_PATH="/tmp/optix-post-publish-native:$LD_LIBRARY_PATH" gradle test \
            -Poptix.version=$VERSION \
            -Poptix.native.path=/tmp/optix-post-publish-native
