name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['[0-9]+.[0-9]+.[0-9]+']
  # Manual publish path: the create-release-tag job pushes the version tag with a
  # token that does not spawn a downstream workflow run, so a tag-triggered publish
  # never fires. Run this workflow manually from the Actions tab against the version
  # tag (e.g. 0.1.12) — github.ref is then refs/tags/<version> and the publish +
  # post-publish-smoke jobs' existing `startsWith(github.ref, 'refs/tags/')` gate fires.
  workflow_dispatch:

jobs:
  # ── preconditions ──────────────────────────────────────────────────────────

  changelog-updated:
    name: Changelog Updated
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check changelog entry exists and is dated
        run: |
          VERSION=$(grep 'version :=' build.sbt | cut -d'"' -f2)
          test -n "$VERSION"
          grep -F "## [$VERSION]" CHANGELOG.md
          grep -F "[$VERSION]:" CHANGELOG.md
          # Only enforce today's date when this PR bumps the version vs main
          MAIN_VERSION=$(git show origin/main:build.sbt 2>/dev/null | grep 'version :=' | cut -d'"' -f2)
          # ...and not when the branch is an already-released version being merged
          # back: $VERSION is then the most recent tag reachable from HEAD, the
          # release happened on its own date, and demanding today's date would
          # mean falsifying the changelog to get the merge through.
          git fetch --tags --quiet 2>/dev/null || true
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ "$VERSION" != "$MAIN_VERSION" ] && \
             [ "${LATEST_TAG#v}" != "$VERSION" ] && \
             ! echo "${{ github.event.pull_request.title }}" | grep -q '^Draft:'; then
            grep -F "## [$VERSION] - $(date +%Y-%m-%d)" CHANGELOG.md
          fi

  version-not-tagged:
    name: Version Not Yet Tagged
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check tag does not already exist for new versions
        run: |
          VERSION=$(grep 'version :=' build.sbt | cut -d'"' -f2)
          test -n "$VERSION"
          git fetch --tags
          MAIN_VERSION=$(git show origin/main:build.sbt 2>/dev/null | grep 'version :=' | cut -d'"' -f2)
          # Only fail if this branch bumps the version and the tag already exists
          if [ "$VERSION" != "$MAIN_VERSION" ] && git tag | grep -q "^${VERSION}$"; then
            # ...unless $VERSION is the most recent tag reachable from HEAD. That
            # means this branch IS the release that produced the tag and is being
            # merged back — not an attempt to reuse a published version. Without
            # this the gate blocks exactly the merge that keeps main in sync with
            # what was published. menger-common hit this: 0.1.6 went to Maven
            # Central from a branch that could then never be merged back.
            #
            # "most recent reachable tag" rather than merely "an ancestor": every
            # older release tag is also an ancestor, so an ancestor test would
            # happily accept build.sbt being reverted to an already-published
            # version, which is the very thing this gate exists to catch.
            #
            # The leading "v" is stripped because optix-jni carries both 0.1.19
            # and v0.1.19 style tags and git describe may return either. This
            # block is kept byte-identical across repos so it can later become a
            # single reusable workflow.
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ "${LATEST_TAG#v}" = "$VERSION" ]; then
              echo "Tag $VERSION is the latest tag reachable from HEAD — merging the release back, allowed"
            else
              echo "ERROR: Tag $VERSION already exists (latest reachable tag is ${LATEST_TAG:-none})"
              exit 1
            fi
          fi

  # ── release gate ───────────────────────────────────────────────────────────

  create-tag:
    name: Create Release Tag
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create and push tag if version changed
        run: |
          VERSION=$(grep 'version :=' build.sbt | cut -d'"' -f2)
          echo "Version in build.sbt: $VERSION"
          if git rev-parse "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists, skipping"
          else
            git config user.email "ci@github-actions.local"
            git config user.name "CI Bot"
            git remote set-url origin "https://x-access-token:${{ secrets.RELEASE_TOKEN }}@github.com/${{ github.repository }}"
            git tag -a "$VERSION" -m "Release $VERSION"
            git push origin "refs/tags/$VERSION"
            echo "Created and pushed tag $VERSION"
          fi

  # ── check ──────────────────────────────────────────────────────────────────

  scalafix:
    name: Scalafix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'sbt'
      - uses: sbt/setup-sbt@v1
      - run: sbt "scalafix --check"

  archunit:
    name: ArchUnit
    runs-on: [self-hosted, Linux, X64, nvidia]
    steps:
      - uses: actions/checkout@v4
      - name: Add CUDA to PATH
        run: echo "/usr/local/cuda/bin" >> $GITHUB_PATH
      - run: sbt "testOnly *ArchUnit*"

  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck
      - name: Run cppcheck
        run: |
          find src/main/native \( -name "*.cpp" -o -name "*.h" \) | \
            xargs cppcheck --error-exitcode=1 --enable=warning,style \
            --language=c++ \
            --suppressions-list=.cppcheck-suppress

  clang-tidy:
    name: clang-tidy
    runs-on: [self-hosted, Linux, X64, nvidia]
    steps:
      - uses: actions/checkout@v4
      - name: Configure CMake (fetches FetchContent deps, generates compile_commands.json)
        run: |
          cmake -B target/cmake-clang-check \
            -DCMAKE_CUDA_COMPILER=/usr/local/cuda/bin/nvcc \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -Wno-dev --log-level=WARNING \
            src/main/native
      - name: Run clang-tidy
        run: |
          mapfile -t cpp_files < <(find src/main/native -name "*.cpp")
          gcc_install_dir="$(dirname "$(g++ -print-file-name=include)")"
          clang-tidy -p target/cmake-clang-check \
            --config-file=.clang-tidy \
            --extra-arg-before=--gcc-install-dir="${gcc_install_dir}" \
            "${cpp_files[@]}"

  doc-completeness:
    name: JNI API Doc Completeness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run doc completeness check
        run: bash scripts/check-doc-completeness.sh

  # ── test ───────────────────────────────────────────────────────────────────

  scala-tests:
    name: Scala Tests (GPU)
    runs-on: [self-hosted, Linux, X64, nvidia]
    steps:
      - uses: actions/checkout@v4
      - name: Add CUDA to PATH
        run: echo "/usr/local/cuda/bin" >> $GITHUB_PATH
      - name: Run Scala tests
        run: sbt test

  # ── build ──────────────────────────────────────────────────────────────────

  build-native:
    name: Build native .so + JAR
    runs-on: [self-hosted, Linux, X64, nvidia]
    needs: [scala-tests, scalafix]
    steps:
      - uses: actions/checkout@v4
      - name: Add CUDA to PATH
        run: echo "/usr/local/cuda/bin" >> $GITHUB_PATH
      - name: Build
        run: sbt nativeCompile package
      - uses: actions/upload-artifact@v4
        with:
          name: optix-jni-artifacts
          path: |
            target/*.jar
            target/scala-3*/*.jar
            target/native/x86_64-linux/bin/*.so

  # ── test-built ─────────────────────────────────────────────────────────────

  smoke-tests:
    name: Smoke Tests (Java + Kotlin)
    runs-on: [self-hosted, Linux, X64, nvidia]
    needs: [build-native]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: optix-jni-artifacts
          path: artifacts/
      - name: Ensure Maven available
        run: |
          if ! command -v mvn &>/dev/null; then
            MVN_VERSION=3.9.9
            curl -fsSL \
              "https://archive.apache.org/dist/maven/maven-3/${MVN_VERSION}/binaries/apache-maven-${MVN_VERSION}-bin.tar.gz" \
              | tar -xz -C /tmp
            echo "/tmp/apache-maven-${MVN_VERSION}/bin" >> $GITHUB_PATH
          fi
      - name: Install built JAR to local Maven repo
        run: |
          VERSION=$(grep 'version :=' build.sbt | cut -d'"' -f2)
          echo "Artifacts found:"
          find artifacts -type f | sort
          JAR=$(find artifacts -name "*.jar" ! -name "*sources*" ! -name "*javadoc*" | head -1)
          if [ -z "$JAR" ]; then
            echo "ERROR: No JAR found in artifacts/"
            exit 1
          fi
          echo "Installing: $JAR as optix-jni:$VERSION"
          mvn install:install-file \
            -Dfile="$JAR" \
            -DgroupId=io.github.lene \
            -DartifactId=optix-jni \
            -Dversion="$VERSION" \
            -Dpackaging=jar \
            -DgeneratePom=true
      - name: Run Java smoke test
        run: |
          VERSION=$(grep 'version :=' build.sbt | cut -d'"' -f2)
          cd smoke-tests/java
          mvn test -Doptix.version=$VERSION \
            -Doptix.native.path=$(pwd)/../../artifacts/native/x86_64-linux/bin
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'
      - name: Run Kotlin smoke test
        run: |
          VERSION=$(grep 'version :=' build.sbt | cut -d'"' -f2)
          NATIVE_PATH=$(pwd)/artifacts/native/x86_64-linux/bin
          cd smoke-tests/kotlin
          LD_LIBRARY_PATH="$NATIVE_PATH:$LD_LIBRARY_PATH" gradle test \
            -Poptix.version=$VERSION -Poptix.native.path=$NATIVE_PATH

  # ── publish ────────────────────────────────────────────────────────────────

  publish:
    name: Publish to Maven Central + GitHub Release
    runs-on: [self-hosted, Linux, X64, nvidia]
    needs: [smoke-tests, build-native]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Add CUDA to PATH
        run: echo "/usr/local/cuda/bin" >> $GITHUB_PATH
      - name: Import GPG key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
      - name: Read release version
        id: ver
        run: echo "version=$(grep 'version :=' build.sbt | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"
      - name: Publish to Maven Central
        run: sbt nativeCompile publishSigned sonatypeBundleRelease
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          PGP_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      - uses: softprops/action-gh-release@v2
        with:
          # On workflow_dispatch from a branch, github.ref is not a tag ref; pin the
          # release/tag to the build.sbt version so the tag-triggered default doesn't
          # attach the release to the branch name.
          tag_name: ${{ steps.ver.outputs.version }}
          files: |
            target/*.jar
            target/scala-3*/*.jar
            target/native/x86_64-linux/bin/*.so
          generate_release_notes: false
          body_path: CHANGELOG.md

  # ── post-publish verification ───────────────────────────────────────────────

  post-publish-smoke:
    name: Post-Publish Smoke Test (Maven Central)
    runs-on: [self-hosted, Linux, X64, nvidia]
    needs: [publish]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Wait for Maven Central sync
        run: |
          VERSION=$(grep 'version :=' build.sbt | cut -d'"' -f2)
          URL="https://repo1.maven.org/maven2/io/github/lene/optix-jni/${VERSION}/optix-jni-${VERSION}.pom"
          for i in $(seq 1 20); do
            if curl -sf "$URL" > /dev/null 2>&1; then
              echo "Artifact available on Maven Central"
              exit 0
            fi
            echo "Not yet available (attempt $i/20), waiting 30s..."
            sleep 30
          done
          echo "ERROR: Artifact not available after 10 minutes"
          exit 1
      - name: Ensure Maven available
        run: |
          if ! command -v mvn &>/dev/null; then
            MVN_VERSION=3.9.9
            curl -fsSL \
              "https://archive.apache.org/dist/maven/maven-3/${MVN_VERSION}/binaries/apache-maven-${MVN_VERSION}-bin.tar.gz" \
              | tar -xz -C /tmp
            echo "/tmp/apache-maven-${MVN_VERSION}/bin" >> $GITHUB_PATH
          fi
      - name: Download native library from GitHub Release
        run: |
          VERSION=$(grep 'version :=' build.sbt | cut -d'"' -f2)
          mkdir -p /tmp/optix-post-publish-native
          gh release download $VERSION --repo lene/optix-jni \
            --pattern "*.so" --dir /tmp/optix-post-publish-native --clobber
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Run Java smoke test against published artifact
        run: |
          VERSION=$(grep 'version :=' build.sbt | cut -d'"' -f2)
          cd smoke-tests/java
          mvn test -Doptix.version=$VERSION \
            -Doptix.native.path=/tmp/optix-post-publish-native
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'
      - name: Run Kotlin smoke test against published artifact
        run: |
          VERSION=$(grep 'version :=' build.sbt | cut -d'"' -f2)
          cd smoke-tests/kotlin
          LD_LIBRARY_PATH="/tmp/optix-post-publish-native:$LD_LIBRARY_PATH" gradle test \
            -Poptix.version=$VERSION \
            -Poptix.native.path=/tmp/optix-post-publish-native
