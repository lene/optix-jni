rules = [
  # Built-in rules for code organization and cleanup
  OrganizeImports,

  # Syntax and style improvements (Scala 3 compatible)
  DisableSyntax,
  LeakingImplicitClassVal,
  NoValInForComprehension,

  # Scala 3 migration helpers
  RedundantSyntax
]

# Configure OrganizeImports (Scala 3 compatible)
OrganizeImports {
  # Sort import groups
  groups = ["re:javax?\\.", "scala.", "*"]
  removeUnused = true
  expandRelative = true
}

# Configure DisableSyntax to prevent unsafe patterns
DisableSyntax {
  noVars = false
  noThrows = false
  noNulls = true
  noReturns = true
  noAsInstanceOf = false
  noIsInstanceOf = false
  noXml = true
}

RemoveUnused {
  imports = false
  privates = true
  locals = true
  patternvars = true
}
